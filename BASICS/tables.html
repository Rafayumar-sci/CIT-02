<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Table</title>
</head>
<body>
    <h1>Basic HTML Table</h1>
      <table border="1px solid black">
            
           <thead>
                <th>level 1</th>
                <th>level 2</th>
                <th>level 3</th>
                <th>Info</th>
                <th>Name</th>
           </thead>
            <tbody>
                <tr>
                    <td rowspan="6">System</td>
                    <td rowspan="4">System Apps</td>
                    <td rowspan="3">system Env</td>
                    <td>App test</td>
                    <td>foo</td>

                </tr>

                <tr>
                    <td>app mem</td>
                    <td>foo</td>

                </tr>
                <tr>
                    
                    <td>app tst</td>
                    
                    <td>bar</td>
                </tr>
                <tr>
                    
                    <td>system env 2</td>
                    <td>app test</td>
                    <td>bar</td>
                </tr>
                <tr>
                    <td rowspan="2">system memory</td>
                    <td rowspan="2">memory test</td>
                    <td>memory func</td>
                    <td>foo</td>

                
                </tr>

                <tr>
                    <td>apes test</td>
                    <td>foo</td>

                </tr>
            </tbody>
      </table>
    
</body>
</html>
