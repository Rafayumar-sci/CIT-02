<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eflyer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <section id="hero-section">
    <nav id="navbar">
        <li><a href="">Best Sellers</a></li>
        <li><a href="">Gift Ideas</a></li>
        <li><a href="">New Releases</a></li>
        <li><a href="">Today's Deals</a></li>
        <li><a href="">Customer Service</a></li>
    </nav>
        <div class="hero-content">
            <img src="assets/logo.png" alt="logo" class="logo">
            <div class="hero-header">
                <i class="fa fa-bars" id="hamburger-icon"></i>
                <select class="category-dropdown">
                    <option>All Category</option>
                    <option>Action</option>
                    <option>Another Action</option>
                    <option>Something else here</option>
                </select>
                <div class="search-bar">
                    <input type="text" placeholder="Search this blog">
                    <button><i class="fa fa-search"></i></button>
                </div>
                <select class="category-dropdown textCol">
                    <option>English</option>
                    <option>French</option>
                </select>
                <div class="hero-header-icon">
                    <i class="fa fa-shopping-cart"></i>Cart
                </div>
                <div class="hero-header-icon">
                    <i class="fa fa-user"></i>Cart
                </div>
            </div>
            <div class="hero-body">
                <h1>Get Start Your Favourite shoping</h1>
                <button>Buy now</button>
            </div>
        </div>
    </section>
</body>
</html>
